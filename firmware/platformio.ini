; ===== V-Strom Smart Cockpit — ESP32 firmware =====
; One shared codebase, two devices: the bench twin and the bike unit.
; Workflow: flash each device once over USB, then update both over WiFi (OTA).

[platformio]
default_envs = bench

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Used by all envs: serial-mirrored console over telnet (the bench relay console
; and OTA log are reachable wirelessly, not just over USB).
lib_deps = jandrassy/TelnetStream@^1.3.0
; Build project src/ into unit tests (main.cpp's setup/loop is guarded out with
; PIO_UNIT_TESTING so the test runner owns them). Run: pio test -e bench
test_build_src = true

; ---------- BENCH twin : USB flash ----------
; MOTO_DEBUG enables LOGD() debug output — bench only; the bike build omits it.
[env:bench]
build_flags = -D DEVICE_NAME=\"vstrom-bench\" -D MOTO_DEBUG=1
; If PlatformIO auto-detects the wrong port, uncomment and set yours
; (find it in Windows Device Manager under "Ports (COM & LPT)"):
; upload_port = COM4
; monitor_port = COM4

; ---------- BENCH twin : OTA over WiFi ----------
[env:bench_ota]
extends = env:bench
upload_protocol = espota
upload_port = vstrom-bike.local
upload_flags = --auth=Moto-11

; ---------- BIKE unit : USB flash ----------
[env:bike]
build_flags = -D DEVICE_NAME=\"vstrom-bike\"
; upload_port = COM4

; ---------- BIKE unit : OTA over WiFi ----------
[env:bike_ota]
extends = env:bike
upload_protocol = espota
upload_port = vstrom-bike.local
upload_flags = --auth=Moto-11
